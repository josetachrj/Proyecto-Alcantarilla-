<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALCANTARILLA - Pago Seguro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            background-image: url('Images/fondo.png');
            background-repeat: repeat;
            background-size: 300px;
            background-attachment: fixed;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Animación de carga para el pago */
        .loader { border: 3px solid rgba(255,255,255,0.1); border-left-color: #b91c1c; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4 backdrop-blur-sm bg-black/60 opacity-0 transition-opacity duration-700 ease-out" onload="document.body.classList.remove('opacity-0')">

    <header class="w-full max-w-6xl mb-8 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-3 group">
            <img src="Images/logo2.jpeg" alt="ALCANTARILLA" class="h-12 w-12 rounded-full border border-white/10 group-hover:border-[#b91c1c] transition">
            <span class="font-black uppercase tracking-widest text-lg group-hover:text-[#b91c1c] transition">Volver a tienda</span>
        </a>
        <div class="flex items-center gap-2 text-neutral-400 text-xs font-bold uppercase tracking-wider bg-black/50 px-4 py-2 rounded-lg border border-white/10">
            <svg class="w-4 h-4 text-[#b91c1c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            Pago Encriptado
        </div>
    </header>

    <div class="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            
            <div class="bg-[#0a0a0a]/95 border border-white/10 p-8 rounded-2xl shadow-2xl backdrop-blur-xl">
                <h2 class="text-lg font-black uppercase tracking-widest text-white mb-6 border-b border-white/10 pb-4">1. Detalles de Envío</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-1.5">Nombre de quien recibe</label>
                        <input type="text" id="checkout-name" required class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-[#b91c1c] uppercase tracking-widest mb-1.5">Dirección de Entrega</label>
                        <textarea id="checkout-address" rows="3" required class="w-full bg-[#b91c1c]/10 border border-[#b91c1c]/30 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] text-sm resize-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-1.5">Correo de Confirmación</label>
                        <input type="email" id="checkout-email" readonly class="w-full bg-black/50 border border-white/5 rounded-lg p-3 text-neutral-500 cursor-not-allowed text-sm">
                    </div>
                </div>
            </div>

            <div class="bg-[#0a0a0a]/95 border border-white/10 p-8 rounded-2xl shadow-2xl backdrop-blur-xl">
                <h2 class="text-lg font-black uppercase tracking-widest text-white mb-6 border-b border-white/10 pb-4">2. Método de Pago</h2>
                
                <form id="payment-form" onsubmit="simularPago(event)">
                    <div class="space-y-5">
                        <div class="relative bg-gradient-to-tr from-neutral-900 to-neutral-800 border border-white/10 p-5 rounded-xl overflow-hidden shadow-inner">
                            <svg class="absolute right-4 bottom-4 w-12 h-12 opacity-10" fill="currentColor" viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                            <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-1.5">Número de Tarjeta</label>
                            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required class="w-full bg-transparent text-xl font-mono text-white placeholder-neutral-600 focus:outline-none mb-4 tracking-widest">
                            
                            <div class="flex gap-4">
                                <div class="flex-1">
                                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-1.5">Vencimiento</label>
                                    <input type="text" placeholder="MM/AA" maxlength="5" required class="w-full bg-transparent text-sm font-mono text-white placeholder-neutral-600 focus:outline-none tracking-widest">
                                </div>
                                <div class="flex-1">
                                    <label class="block text-[10px] font-bold text-neutral-400 uppercase tracking-widest mb-1.5">CVC</label>
                                    <input type="password" placeholder="•••" maxlength="4" required class="w-full bg-transparent text-sm font-mono text-white placeholder-neutral-600 focus:outline-none tracking-widest">
                                </div>
                            </div>
                        </div>
                        
                        <button type="submit" id="btn-pay" class="w-full bg-[#b91c1c] text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest hover:bg-[#dc2626] transition flex justify-center items-center gap-3 shadow-[0_0_15px_rgba(185,28,28,0.3)]">
                            <span id="btn-text">Completar Pedido Seguro</span>
                            <div id="btn-loader" class="loader hidden"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="bg-[#0a0a0a]/95 border border-white/10 p-8 rounded-2xl shadow-2xl backdrop-blur-xl sticky top-28">
                <h2 class="text-lg font-black uppercase tracking-widest text-white mb-6 border-b border-white/10 pb-4">Tu Pedido</h2>
                
                <div id="checkout-items" class="space-y-4 max-h-[40vh] overflow-y-auto no-scrollbar mb-6">
                    </div>

                <div class="border-t border-white/10 pt-4 space-y-3 font-mono text-sm">
                    <div class="flex justify-between text-neutral-400"><span>Subtotal</span><span id="summary-subtotal">$0 MXN</span></div>
                    <div class="flex justify-between text-neutral-400"><span>Envío Express</span><span>$150 MXN</span></div>
                    <div class="flex justify-between text-white font-black text-xl pt-2 border-t border-white/10 mt-2">
                        <span class="font-sans uppercase">Total</span><span id="summary-total" class="text-[#b91c1c]">$0 MXN</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#111111] border border-[#b91c1c]/50 rounded-2xl shadow-[0_0_50px_rgba(185,28,28,0.3)] w-full max-w-sm p-8 text-center transform scale-95 opacity-0 transition-all duration-300" id="success-content">
            <div class="w-16 h-16 bg-[#b91c1c]/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-[#b91c1c]">
                <svg class="w-8 h-8 text-[#b91c1c]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black uppercase text-white mb-2">¡Pago Exitoso!</h2>
            <p class="text-xs text-neutral-400 mb-6 leading-relaxed">Tu pedido ha sido procesado. Te enviaremos el código de rastreo a tu correo en breve. Bienvenido al clan.</p>
            <button onclick="finalizarCompra()" class="w-full bg-white text-black font-black py-3 rounded-lg uppercase tracking-widest text-[11px] hover:bg-neutral-200 transition">Regresar a la Tienda</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            verificarSesionYCarrito();
        });

        function verificarSesionYCarrito() {
            const session = JSON.parse(localStorage.getItem('alcantarillaSession'));
            const carrito = JSON.parse(localStorage.getItem('alcantarillaCart')) || [];

            // 1. Si no hay carrito, regresarlo
            if (carrito.length === 0) {
                alert("Tu carrito está vacío. Redirigiendo a la tienda...");
                window.location.href = 'index.html';
                return;
            }

            // 2. Si no hay sesión, regresarlo a login
            if (!session) {
                alert("Debes iniciar sesión para completar tu compra.");
                window.location.href = 'login.html';
                return;
            }

            // 3. Rellenar datos del usuario
            document.getElementById('checkout-name').value = session.nombre;
            document.getElementById('checkout-email').value = session.email;
            if (session.direccion) {
                document.getElementById('checkout-address').value = session.direccion;
            }

            // 4. Pintar los items del pedido
            const itemsContainer = document.getElementById('checkout-items');
            itemsContainer.innerHTML = carrito.map(item => `
                <div class="flex items-center gap-4 bg-white/5 p-3 rounded-xl border border-white/5">
                    <img src="${item.imagen}" class="w-12 h-16 object-cover rounded bg-black">
                    <div class="flex-1 min-w-0">
                        <h4 class="text-[11px] font-bold text-white uppercase truncate">${item.nombre}</h4>
                        <p class="text-[10px] text-neutral-500 mt-0.5">Cant: ${item.amount}</p>
                    </div>
                    <p class="text-xs text-[#b91c1c] font-mono font-bold">$${(item.precio * item.amount).toLocaleString('es-MX')}</p>
                </div>
            `).join('');

            // 5. Calcular totales
            const subtotal = carrito.reduce((ac, item) => ac + (item.precio * item.amount), 0);
            const costoEnvio = 150;
            const total = subtotal + costoEnvio;

            document.getElementById('summary-subtotal').innerText = `$${subtotal.toLocaleString('es-MX')} MXN`;
            document.getElementById('summary-total').innerText = `$${total.toLocaleString('es-MX')} MXN`;
            document.getElementById('btn-text').innerText = `Pagar $${total.toLocaleString('es-MX')} MXN`;
        }

        function simularPago(e) {
            e.preventDefault();
            
            // Efectos de carga visual
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const btnPay = document.getElementById('btn-pay');
            
            btnText.innerText = "Procesando...";
            btnLoader.classList.remove('hidden');
            btnPay.classList.add('opacity-80', 'cursor-not-allowed');
            btnPay.disabled = true;

            // Simular espera de banco (2.5 segundos)
            setTimeout(() => {
                // Limpiar el carrito porque ya compró
                localStorage.removeItem('alcantarillaCart');

                // Mostrar ventana de éxito
                const modal = document.getElementById('success-modal');
                const content = document.getElementById('success-content');
                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    content.classList.remove('scale-95', 'opacity-0');
                    content.classList.add('scale-100', 'opacity-100');
                }, 10);
            }, 2500);
        }

        function finalizarCompra() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
