<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALCANTARILLA - Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="flex items-center justify-between mb-10 border-b border-white/10 pb-6">
            <div class="flex items-center gap-4">
                <img src="Images/logo2.jpeg" alt="Logo" class="w-12 h-12 rounded-full border border-white/10 object-cover">
                <div>
                    <h1 class="text-2xl font-black uppercase tracking-widest text-white">Centro de Mando</h1>
                    <p class="text-xs text-[#b91c1c] font-bold">ALCANTARILLA ADMIN</p>
                </div>
            </div>
            <a href="Colecciones.html" target="_blank" class="text-xs text-neutral-400 hover:text-white transition uppercase font-bold border border-white/10 px-4 py-2 rounded-lg bg-white/5">Ver Tienda</a>
        </header>

        <div class="bg-[#111111] border border-white/10 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-6 uppercase tracking-wider">Subir Nueva Prenda</h2>
            
            <form id="form-subir-producto" onsubmit="window.subirPrenda(event)" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Nombre de la Prenda</label>
                        <input type="text" id="prod-nombre" required placeholder="Ej. Hoodie Oversize Black" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Precio (MXN)</label>
                        <input type="number" id="prod-precio" required placeholder="Ej. 850" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c]">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">URL Imagen Frente</label>
                        <input type="url" id="prod-img-frente" required placeholder="https://tusitio.com/foto-frente.jpg" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">URL Imagen Espalda (Opcional)</label>
                        <input type="url" id="prod-img-espalda" placeholder="https://tusitio.com/foto-espalda.jpg" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c]">
                    </div>
                </div>

                <div class="border-t border-white/10 pt-6">
                    <label class="block text-xs font-bold text-white uppercase mb-4 tracking-widest">Inventario Físico (Piezas Disponibles)</label>
                    <div class="grid grid-cols-5 gap-4">
                        <div>
                            <span class="block text-center text-[10px] text-neutral-500 mb-1 font-bold">XS</span>
                            <input type="number" id="stock-xs" value="0" min="0" class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-center text-white focus:outline-none focus:border-[#b91c1c]">
                        </div>
                        <div>
                            <span class="block text-center text-[10px] text-neutral-500 mb-1 font-bold">S</span>
                            <input type="number" id="stock-s" value="0" min="0" class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-center text-white focus:outline-none focus:border-[#b91c1c]">
                        </div>
                        <div>
                            <span class="block text-center text-[10px] text-neutral-500 mb-1 font-bold">M</span>
                            <input type="number" id="stock-m" value="0" min="0" class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-center text-white focus:outline-none focus:border-[#b91c1c]">
                        </div>
                        <div>
                            <span class="block text-center text-[10px] text-neutral-500 mb-1 font-bold">G</span>
                            <input type="number" id="stock-g" value="0" min="0" class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-center text-white focus:outline-none focus:border-[#b91c1c]">
                        </div>
                        <div>
                            <span class="block text-center text-[10px] text-neutral-500 mb-1 font-bold">XL</span>
                            <input type="number" id="stock-xl" value="0" min="0" class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-center text-white focus:outline-none focus:border-[#b91c1c]">
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="btn-subir" class="w-full bg-[#b91c1c] text-white font-black py-4 rounded-xl uppercase tracking-widest text-sm hover:bg-[#dc2626] transition shadow-lg shadow-[#b91c1c]/20">Publicar en la Tienda</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        // Conexión a Supabase
        const supabaseUrl = 'https://ercphbjivnmytwbslqit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3BoYmppdm5teXR3YnNscWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTkxMzcsImV4cCI6MjA5Njg3NTEzN30.JCKW9bV1IQLbhI26kgTyFhyHUbEV58FSSzVj9SE_D-w';
        window.db = window.supabase.createClient(supabaseUrl, supabaseKey);

        window.subirPrenda = async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-subir');
            
            // Recolectar datos
            const nombre = document.getElementById('prod-nombre').value;
            const precio = parseFloat(document.getElementById('prod-precio').value);
            const imgFrente = document.getElementById('prod-img-frente').value;
            const imgEspalda = document.getElementById('prod-img-espalda').value || null;
            
            const s_xs = parseInt(document.getElementById('stock-xs').value) || 0;
            const s_s = parseInt(document.getElementById('stock-s').value) || 0;
            const s_m = parseInt(document.getElementById('stock-m').value) || 0;
            const s_g = parseInt(document.getElementById('stock-g').value) || 0;
            const s_xl = parseInt(document.getElementById('stock-xl').value) || 0;

            btn.innerText = "SUBIENDO PRENDA...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            try {
                const { data, error } = await window.db.from('productos').insert([{
                    nombre: nombre,
                    precio: precio,
                    imagen_url: imgFrente,
                    imagen_espalda_url: imgEspalda,
                    stock_xs: s_xs,
                    stock_s: s_s,
                    stock_m: s_m,
                    stock_g: s_g,
                    stock_xl: s_xl,
                    activo: true
                }]);

                if (error) throw error;

                showToast('Éxito', '¡La prenda ya está visible en la tienda!');
                e.target.reset(); // Limpia el formulario para la siguiente prenda

            } catch (err) {
                console.error("Error al subir:", err);
                showToast('Error', 'Hubo un problema. Revisa la consola.');
            } finally {
                btn.innerText = "Publicar en la Tienda";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            }
        };

        function showToast(title, message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-black/80 backdrop-blur-xl border border-white/10 text-white p-4 rounded-xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto`;
            toast.innerHTML = `<div class="text-xl">⚙️</div><div><h4 class="font-bold text-[11px] uppercase tracking-wider text-[#b91c1c]">${title}</h4><p class="text-xs text-neutral-300 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3500);
        }
    </script>
</body>
</html>
