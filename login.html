<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - ALCANTARILLA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            background-image: url('Images/fondo.png');
            background-repeat: repeat;
            background-size: 300px;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <a href="Colecciones.html" class="absolute top-8 left-8 text-neutral-400 hover:text-white transition flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver a la tienda
    </a>

    <div class="w-full max-w-md bg-black/60 p-8 md:p-10 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl">
        <div class="flex justify-center mb-8">
            <img src="Images/logo2.jpeg" alt="ALCANTARILLA" class="w-20 h-20 rounded-full border border-white/10 object-cover shadow-lg">
        </div>
        
        <h1 class="text-2xl font-black uppercase text-white text-center mb-2 tracking-widest">Acceso al Clan</h1>
        <p class="text-xs text-neutral-400 text-center mb-8 uppercase tracking-wider">Inicia sesión o crea tu cuenta</p>

        <form id="auth-form" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Correo Electrónico</label>
                <input type="email" id="auth-email" required class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] transition">
            </div>
            <div>
                <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Contraseña</label>
                <input type="password" id="auth-pass" required minlength="6" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] transition">
            </div>

            <div class="pt-4 flex flex-col gap-3">
                <button type="submit" id="btn-login" onclick="iniciarSesion(event)" class="w-full bg-white text-black font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-neutral-300 transition shadow-lg">Iniciar Sesión</button>
                
                <button type="button" id="btn-register" onclick="crearCuenta(event)" class="w-full bg-transparent border border-white/20 text-white font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-white/10 transition">Crear Cuenta</button>
            </div>
        </form>
    </div>

    <!-- Contenedor Toasts -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

   <script>
        const supabaseUrl = 'https://ercphbjivnmytwbslqit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3BoYmppdm5teXR3YnNscWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTkxMzcsImV4cCI6MjA5Njg3NTEzN30.JCKW9bV1IQLbhI26kgTyFhyHUbEV58FSSzVj9SE_D-w';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        // CORREO ADMIN ASEGURADO EN MINÚSCULAS
        const CORREO_ADMIN = 'shopalcantarilla@gmail.com'.toLowerCase(); 

        async function iniciarSesion(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            if(!email || !password) return showToast('Error', 'Llena ambos campos');

            const btn = document.getElementById('btn-login');
            btn.innerText = "ENTRANDO..."; btn.disabled = true;

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;

                showToast('Éxito', 'Acceso concedido.');
                
                // REDIRECCIÓN INTELIGENTE
                setTimeout(() => {
                    const emailUsuario = data.user.email.toLowerCase();
                    if (emailUsuario === CORREO_ADMIN) {
                        window.location.href = 'admin.html'; // El jefe va al panel
                    } else {
                        window.location.href = 'Colecciones.html'; // Clientes a la tienda
                    }
                }, 1000);

            } catch (err) {
                showToast('Error', 'Correo o contraseña incorrectos.');
                btn.innerText = "Iniciar Sesión"; btn.disabled = false;
            }
        }

        async function crearCuenta(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            if(!email || !password) return showToast('Error', 'Llena ambos campos para registrarte');

            const btn = document.getElementById('btn-register');
            btn.innerText = "CREANDO..."; btn.disabled = true;

            try {
                const { data, error } = await db.auth.signUp({ email, password });
                if (error) throw error;

                showToast('Bienvenido', 'Tu cuenta ha sido creada. Entrando...');
                
                // REDIRECCIÓN INTELIGENTE TAMBIÉN AL CREAR CUENTA
                setTimeout(() => {
                    const emailUsuario = data.user.email.toLowerCase();
                    if (emailUsuario === CORREO_ADMIN) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'Colecciones.html';
                    }
                }, 1500);

            } catch (err) {
                showToast('Error', 'No se pudo crear la cuenta. Tal vez ya existe.');
                btn.innerText = "Crear Cuenta"; btn.disabled = false;
            }
        }

        function showToast(title, message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-black/80 backdrop-blur-xl border border-white/10 text-white p-4 rounded-xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto`;
            toast.innerHTML = `<div class="text-xl">🔥</div><div><h4 class="font-bold text-[11px] uppercase tracking-wider text-[#b91c1c]">${title}</h4><p class="text-xs text-neutral-300 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
