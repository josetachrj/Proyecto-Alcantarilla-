<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta - ALCANTARILLA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            background-image: url('Images/fondo.png');
            background-repeat: repeat;
            background-size: 300px;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <a href="Colecciones.html" class="absolute top-8 left-8 text-neutral-400 hover:text-white transition flex items-center gap-2 text-xs font-bold uppercase tracking-widest">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        Volver a la tienda
    </a>

    <div class="w-full max-w-md bg-black/60 p-8 md:p-10 rounded-3xl border border-white/10 backdrop-blur-xl shadow-[0_0_50px_rgba(0,0,0,0.8)] min-h-[400px] flex flex-col justify-center relative">
        
        <div class="flex justify-center mb-6">
            <img src="Images/logo2.jpeg" alt="ALCANTARILLA" class="w-20 h-20 rounded-full border border-white/10 object-cover shadow-lg">
        </div>
        
        <!-- PANTALLA DE CARGA (Se oculta al detectar la sesión) -->
        <div id="loader-view" class="flex flex-col items-center justify-center space-y-4">
            <div class="w-8 h-8 border-4 border-[#b91c1c] border-t-transparent rounded-full animate-spin"></div>
            <p class="text-xs text-neutral-500 uppercase tracking-widest font-mono">Verificando pase...</p>
        </div>

        <!-- PANTALLA 1: FORMULARIO DE LOGIN (Oculto por defecto) -->
        <div id="login-view" class="hidden w-full">
            <h1 class="text-2xl font-black uppercase text-white text-center mb-2 tracking-widest">Acceso al Clan</h1>
            <p class="text-xs text-neutral-400 text-center mb-8 uppercase tracking-wider">Inicia sesión o crea tu cuenta</p>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Correo Electrónico</label>
                    <input type="email" id="auth-email" required class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] transition">
                </div>
                <div>
                    <label class="block text-xs font-bold text-neutral-400 uppercase mb-2">Contraseña</label>
                    <input type="password" id="auth-pass" required minlength="6" class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-white focus:outline-none focus:border-[#b91c1c] transition">
                </div>

                <div class="pt-4 flex flex-col gap-3">
                    <button type="submit" id="btn-login" onclick="iniciarSesion(event)" class="w-full bg-white text-black font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-neutral-300 transition shadow-lg">Iniciar Sesión</button>
                    
                    <button type="button" id="btn-register" onclick="crearCuenta(event)" class="w-full bg-transparent border border-white/20 text-white font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-white/10 transition">Crear Cuenta</button>
                </div>
            </form>
        </div>

        <!-- PANTALLA 2: PANEL DEL CLIENTE LOGUEADO (Oculto por defecto) -->
        <div id="dashboard-view" class="hidden flex-col items-center text-center space-y-6 w-full">
            <div>
                <h2 class="text-xl font-black text-white uppercase tracking-widest">Bienvenido de vuelta</h2>
                <p id="user-email-display" class="text-xs text-[#b91c1c] font-mono mt-2 bg-white/5 px-3 py-1 rounded inline-block border border-white/10"></p>
            </div>
            
            <div class="w-full space-y-3 pt-6 border-t border-white/10">
                <a href="rastreo.html" class="block w-full bg-[#b91c1c] text-white font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-[#dc2626] transition shadow-lg shadow-red-900/20">📍 Rastrear Mis Pedidos</a>
                <a href="Colecciones.html" class="block w-full bg-white/5 text-white font-black py-3.5 rounded-xl uppercase tracking-widest text-xs hover:bg-white/10 transition border border-white/10">Ir a la Tienda</a>
                <button onclick="cerrarSesion()" class="w-full bg-transparent text-neutral-500 font-bold py-3.5 rounded-xl uppercase tracking-widest text-[10px] hover:text-white transition mt-2">Cerrar Sesión</button>
            </div>
        </div>

    </div>

    <!-- Contenedor Toasts -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 pointer-events-none"></div>

   <script>
        const supabaseUrl = 'https://ercphbjivnmytwbslqit.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyY3BoYmppdm5teXR3YnNscWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyOTkxMzcsImV4cCI6MjA5Njg3NTEzN30.JCKW9bV1IQLbhI26kgTyFhyHUbEV58FSSzVj9SE_D-w';
        const db = window.supabase.createClient(supabaseUrl, supabaseKey);

        const CORREO_ADMIN = 'shopalcantarilla@gmail.com'.toLowerCase(); 

        // 1. EL GUARDIÁN DE SESIÓN (Se ejecuta al abrir la página)
        async function verificarSesion() {
            try {
                const { data: { user }, error } = await db.auth.getUser();
                
                // Ocultamos el ícono de carga
                document.getElementById('loader-view').classList.add('hidden');

                if (user) {
                    // SI ESTÁ LOGUEADO: Verificamos si es el admin
                    if (user.email.toLowerCase() === CORREO_ADMIN) {
                        window.location.href = 'admin.html'; // Lo mandamos a su panel
                    } else {
                        // Es cliente: Le mostramos su Dashboard
                        document.getElementById('dashboard-view').classList.remove('hidden');
                        document.getElementById('dashboard-view').classList.add('flex');
                        document.getElementById('user-email-display').innerText = user.email;
                    }
                } else {
                    // NO ESTÁ LOGUEADO: Le mostramos el formulario
                    document.getElementById('login-view').classList.remove('hidden');
                }
            } catch (err) {
                document.getElementById('loader-view').classList.add('hidden');
                document.getElementById('login-view').classList.remove('hidden');
            }
        }

        // Ejecutar el guardián al cargar la página
        document.addEventListener('DOMContentLoaded', verificarSesion);

        // 2. FUNCIÓN PARA CERRAR SESIÓN
        async function cerrarSesion() {
            await db.auth.signOut();
            window.location.reload(); // Recarga la página y mostrará el formulario de login de nuevo
        }

        // 3. LÓGICA DE LOGIN ORIGINAL
        async function iniciarSesion(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            if(!email || !password) return showToast('Error', 'Llena ambos campos');

            const btn = document.getElementById('btn-login');
            btn.innerText = "ENTRANDO..."; btn.disabled = true;

            try {
                const { data, error } = await db.auth.signInWithPassword({ email, password });
                if (error) throw error;

                showToast('Éxito', 'Acceso concedido.');
                
                setTimeout(() => {
                    const emailUsuario = data.user.email.toLowerCase();
                    if (emailUsuario === CORREO_ADMIN) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.reload(); // Recarga la página para mostrar el Dashboard
                    }
                }, 1000);

            } catch (err) {
                showToast('Error', 'Correo o contraseña incorrectos.');
                btn.innerText = "Iniciar Sesión"; btn.disabled = false;
            }
        }

        async function crearCuenta(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-pass').value;
            if(!email || !password) return showToast('Error', 'Llena ambos campos para registrarte');

            const btn = document.getElementById('btn-register');
            btn.innerText = "CREANDO..."; btn.disabled = true;

            try {
                const { data, error } = await db.auth.signUp({ email, password });
                if (error) throw error;

                showToast('Bienvenido', 'Tu cuenta ha sido creada. Entrando...');
                
                setTimeout(() => {
                    const emailUsuario = data.user.email.toLowerCase();
                    if (emailUsuario === CORREO_ADMIN) {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.reload(); // Recarga la página para mostrar el Dashboard
                    }
                }, 1500);

            } catch (err) {
                showToast('Error', 'No se pudo crear la cuenta. Tal vez ya existe.');
                btn.innerText = "Crear Cuenta"; btn.disabled = false;
            }
        }

        function showToast(title, message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `bg-black/80 backdrop-blur-xl border border-white/10 text-white p-4 rounded-xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0 pointer-events-auto`;
            toast.innerHTML = `<div class="text-xl">🔥</div><div><h4 class="font-bold text-[11px] uppercase tracking-wider text-[#b91c1c]">${title}</h4><p class="text-xs text-neutral-300 mt-0.5">${message}</p></div>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.remove('translate-x-full', 'opacity-0'); }, 10);
            setTimeout(() => { toast.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => toast.remove(), 300); }, 3000);
        }
    </script>
</body>
</html>
